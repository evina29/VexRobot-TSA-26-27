<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 860 520" font-family="Arial, sans-serif">
  <rect width="860" height="520" fill="white"/>
  <text x="430" y="36" text-anchor="middle" font-size="22" font-weight="bold">Collector Bot wiring</text>
  <text x="430" y="60" text-anchor="middle" font-size="13" fill="#555">All connections use VEX V5 smart cables. No custom wiring or PCB.</text>

  <rect x="320" y="120" width="220" height="280" rx="10" fill="#2b2b2b"/>
  <rect x="345" y="150" width="170" height="100" rx="4" fill="#7fb3d5"/>
  <text x="430" y="205" text-anchor="middle" font-size="14" fill="#1b2631">screen</text>
  <text x="430" y="290" text-anchor="middle" font-size="18" fill="white" font-weight="bold">VEX V5 Brain</text>

  <rect x="320" y="310" width="30" height="20" fill="#f4d03f"/>
  <text x="335" y="325" text-anchor="middle" font-size="12" font-weight="bold">1</text>
  <rect x="320" y="345" width="30" height="20" fill="#f4d03f"/>
  <text x="335" y="360" text-anchor="middle" font-size="12" font-weight="bold">2</text>
  <rect x="510" y="310" width="30" height="20" fill="#f4d03f"/>
  <text x="525" y="325" text-anchor="middle" font-size="12" font-weight="bold">3</text>
  <rect x="510" y="345" width="30" height="20" fill="#f4d03f"/>
  <text x="525" y="360" text-anchor="middle" font-size="12" font-weight="bold">4</text>

  <rect x="60" y="285" width="180" height="60" rx="8" fill="#c0392b"/>
  <text x="150" y="310" text-anchor="middle" font-size="15" fill="white" font-weight="bold">Left drive motor</text>
  <text x="150" y="330" text-anchor="middle" font-size="12" fill="white">port 1</text>
  <line x1="240" y1="315" x2="320" y2="320" stroke="#333" stroke-width="3"/>

  <rect x="60" y="360" width="180" height="60" rx="8" fill="#c0392b"/>
  <text x="150" y="385" text-anchor="middle" font-size="15" fill="white" font-weight="bold">Right drive motor</text>
  <text x="150" y="405" text-anchor="middle" font-size="12" fill="white">port 2 (reversed in code)</text>
  <line x1="240" y1="390" x2="320" y2="355" stroke="#333" stroke-width="3"/>

  <rect x="620" y="285" width="180" height="60" rx="8" fill="#1e8449"/>
  <text x="710" y="310" text-anchor="middle" font-size="15" fill="white" font-weight="bold">Arm motor</text>
  <text x="710" y="330" text-anchor="middle" font-size="12" fill="white">port 3</text>
  <line x1="540" y1="320" x2="620" y2="315" stroke="#333" stroke-width="3"/>

  <rect x="620" y="360" width="180" height="60" rx="8" fill="#1e8449"/>
  <text x="710" y="385" text-anchor="middle" font-size="15" fill="white" font-weight="bold">Claw motor</text>
  <text x="710" y="405" text-anchor="middle" font-size="12" fill="white">port 4</text>
  <line x1="540" y1="390" x2="620" y2="355" stroke="#333" stroke-width="3"/>

  <rect x="330" y="440" width="200" height="50" rx="8" fill="#5d6d7e"/>
  <text x="430" y="462" text-anchor="middle" font-size="15" fill="white" font-weight="bold">V5 Battery</text>
  <text x="430" y="480" text-anchor="middle" font-size="12" fill="white">battery port</text>
  <line x1="430" y1="440" x2="430" y2="400" stroke="#333" stroke-width="3"/>

  <rect x="620" y="130" width="180" height="60" rx="8" fill="#8e44ad"/>
  <text x="710" y="155" text-anchor="middle" font-size="15" fill="white" font-weight="bold">V5 Controller</text>
  <text x="710" y="175" text-anchor="middle" font-size="12" fill="white">wireless (VEXnet radio)</text>
  <line x1="620" y1="160" x2="540" y2="180" stroke="#333" stroke-width="3" stroke-dasharray="8,6"/>
</svg>
